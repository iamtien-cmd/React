<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1A535C" opacity="0.1"/>
  
  <!-- Monkey head -->
  <ellipse cx="100" cy="85" rx="45" ry="42" fill="#8B5A3C"/>
  
  <!-- Face area -->
  <ellipse cx="100" cy="90" rx="35" ry="30" fill="#D4A574"/>
  
  <!-- Ears -->
  <ellipse cx="65" cy="75" rx="12" ry="15" fill="#8B5A3C"/>
  <ellipse cx="135" cy="75" rx="12" ry="15" fill="#8B5A3C"/>
  <ellipse cx="65" cy="77" rx="7" ry="9" fill="#D4A574"/>
  <ellipse cx="135" cy="77" rx="7" ry="9" fill="#D4A574"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="85" r="10" fill="white"/>
  <circle cx="115" cy="85" r="10" fill="white"/>
  <circle cx="87" cy="87" r="6" fill="#2C3E50"/>
  <circle cx="117" cy="87" r="6" fill="#2C3E50"/>
  <circle cx="89" cy="84" r="2" fill="white"/>
  <circle cx="119" cy="84" r="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="100" rx="8" ry="6" fill="#6B4423"/>
  
  <!-- Mouth - smile -->
  <path d="M 85 105 Q 100 115 115 105" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Laptop -->
  <rect x="55" y="125" width="90" height="55" rx="3" fill="#34495E"/>
  <rect x="60" y="130" width="80" height="40" fill="#4ECDC4"/>
  
  <!-- Laptop base -->
  <rect x="55" y="180" width="90" height="10" fill="#2C3E50"/>
  
  <!-- Screen content - support icons -->
  <circle cx="75" cy="145" r="6" fill="white"/>
  <path d="M 75 140 L 75 150 M 70 145 L 80 145" stroke="#4ECDC4" stroke-width="2"/>
  
  <rect x="90" y="138" width="15" height="14" rx="2" fill="white"/>
  <line x1="92" y1="142" x2="103" y2="142" stroke="#4ECDC4" stroke-width="1.5"/>
  <line x1="92" y1="146" x2="103" y2="146" stroke="#4ECDC4" stroke-width="1.5"/>
  
  <circle cx="120" cy="145" r="6" fill="white"/>
  <path d="M 117 145 L 120 148 L 126 140" stroke="#4ECDC4" stroke-width="2" fill="none"/>
  
  <line x1="65" y1="160" x2="85" y2="160" stroke="white" stroke-width="2"/>
  <line x1="90" y1="160" x2="125" y2="160" stroke="white" stroke-width="2"/>
  
  <!-- Paws on keyboard -->
  <ellipse cx="70" cy="187" rx="10" ry="7" fill="#8B5A3C"/>
  <ellipse cx="130" cy="187" rx="10" ry="7" fill="#8B5A3C"/>
  
  <!-- Tail curve -->
  <path d="M 140 85 Q 165 70 170 90" stroke="#8B5A3C" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
