<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#6A0DAD" opacity="0.1"/>
  
  <!-- Cat head -->
  <ellipse cx="100" cy="90" rx="45" ry="40" fill="#FF9E5C"/>
  
  <!-- Left ear -->
  <path d="M 70 65 L 60 35 L 80 60 Z" fill="#FF9E5C"/>
  <path d="M 70 65 L 63 40 L 78 62 Z" fill="#FFB380"/>
  
  <!-- Right ear -->
  <path d="M 130 65 L 140 35 L 120 60 Z" fill="#FF9E5C"/>
  <path d="M 130 65 L 137 40 L 122 62 Z" fill="#FFB380"/>
  
  <!-- Eyes -->
  <ellipse cx="85" cy="85" rx="8" ry="12" fill="#2C3E50"/>
  <ellipse cx="115" cy="85" rx="8" ry="12" fill="#2C3E50"/>
  <ellipse cx="87" cy="82" rx="3" ry="5" fill="white"/>
  <ellipse cx="117" cy="82" rx="3" ry="5" fill="white"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 95 100 L 105 100 Z" fill="#FF6B9D"/>
  
  <!-- Mouth -->
  <path d="M 100 100 Q 90 105 85 100" stroke="#2C3E50" stroke-width="2" fill="none"/>
  <path d="M 100 100 Q 110 105 115 100" stroke="#2C3E50" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="60" y1="90" x2="75" y2="88" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="60" y1="95" x2="75" y2="95" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="140" y1="90" x2="125" y2="88" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="140" y1="95" x2="125" y2="95" stroke="#2C3E50" stroke-width="1.5"/>
  
  <!-- Laptop -->
  <rect x="60" y="120" width="80" height="50" rx="3" fill="#34495E"/>
  <rect x="65" y="125" width="70" height="35" fill="#52C4E5"/>
  
  <!-- Laptop keyboard -->
  <rect x="60" y="170" width="80" height="8" fill="#2C3E50"/>
  
  <!-- Code on screen -->
  <line x1="70" y1="132" x2="95" y2="132" stroke="white" stroke-width="2"/>
  <line x1="70" y1="140" x2="110" y2="140" stroke="white" stroke-width="2"/>
  <line x1="70" y1="148" x2="85" y2="148" stroke="white" stroke-width="2"/>
  <line x1="70" y1="156" x2="120" y2="156" stroke="white" stroke-width="2"/>
  
  <!-- Paws on keyboard -->
  <ellipse cx="75" cy="175" rx="8" ry="6" fill="#FF9E5C"/>
  <ellipse cx="125" cy="175" rx="8" ry="6" fill="#FF9E5C"/>
</svg>
