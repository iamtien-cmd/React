<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#FFE8E8" opacity="0.5"/>
  
  <!-- Bear head -->
  <circle cx="100" cy="85" r="40" fill="#C9A87C"/>
  
  <!-- Ears -->
  <circle cx="70" cy="60" r="18" fill="#C9A87C"/>
  <circle cx="130" cy="60" r="18" fill="#C9A87C"/>
  <circle cx="70" cy="62" r="12" fill="#E8D5C4"/>
  <circle cx="130" cy="62" r="12" fill="#E8D5C4"/>
  
  <!-- Snout -->
  <ellipse cx="100" cy="95" rx="22" ry="18" fill="#E8D5C4"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="80" r="6" fill="#2C3E50"/>
  <circle cx="112" cy="80" r="6" fill="#2C3E50"/>
  <circle cx="90" cy="78" r="2" fill="white"/>
  <circle cx="114" cy="78" r="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="95" rx="7" ry="5" fill="#2C3E50"/>
  
  <!-- Mouth -->
  <path d="M 100 95 Q 92 102 88 100" stroke="#2C3E50" stroke-width="2" fill="none"/>
  <path d="M 100 95 Q 108 102 112 100" stroke="#2C3E50" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="145" rx="38" ry="40" fill="#C9A87C"/>
  
  <!-- Arms -->
  <ellipse cx="65" cy="140" rx="14" ry="28" fill="#C9A87C"/>
  <ellipse cx="135" cy="140" rx="14" ry="28" fill="#C9A87C"/>
  
  <!-- Paws -->
  <ellipse cx="65" cy="165" rx="10" ry="8" fill="#E8D5C4"/>
  <ellipse cx="135" cy="165" rx="10" ry="8" fill="#E8D5C4"/>
  
  <!-- Heart (volunteer symbol) -->
  <path d="M 100 130 Q 90 120 85 125 Q 80 130 85 140 L 100 155 L 115 140 Q 120 130 115 125 Q 110 120 100 130 Z" fill="#FF6B9D"/>
  
  <!-- Volunteer badge/ribbon -->
  <rect x="85" y="175" width="30" height="15" rx="2" fill="#4ECDC4"/>
  <text x="92" y="186" font-family="Arial" font-size="10" font-weight="bold" fill="white">★</text>
  
  <!-- Ribbon tails -->
  <path d="M 90 190 L 88 200 L 92 195 Z" fill="#4ECDC4"/>
  <path d="M 110 190 L 112 200 L 108 195 Z" fill="#4ECDC4"/>
  
  <!-- Sparkles around heart -->
  <circle cx="75" cy="125" r="2" fill="#FFD700"/>
  <circle cx="125" cy="125" r="2" fill="#FFD700"/>
  <circle cx="90" cy="155" r="2" fill="#FFD700"/>
  <circle cx="110" cy="155" r="2" fill="#FFD700"/>
</svg>
