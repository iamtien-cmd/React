<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#E8F4F8" opacity="0.5"/>
  
  <!-- Panda head -->
  <circle cx="100" cy="80" r="40" fill="white"/>
  
  <!-- Ears -->
  <circle cx="70" cy="55" r="15" fill="#2C3E50"/>
  <circle cx="130" cy="55" r="15" fill="#2C3E50"/>
  
  <!-- Eye patches -->
  <ellipse cx="85" cy="75" rx="12" ry="15" fill="#2C3E50"/>
  <ellipse cx="115" cy="75" rx="12" ry="15" fill="#2C3E50"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="75" r="6" fill="white"/>
  <circle cx="115" cy="75" r="6" fill="white"/>
  <circle cx="87" cy="75" r="4" fill="#2C3E50"/>
  <circle cx="117" cy="75" r="4" fill="#2C3E50"/>
  <circle cx="89" cy="73" r="2" fill="white"/>
  <circle cx="119" cy="73" r="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="6" ry="5" fill="#2C3E50"/>
  
  <!-- Mouth -->
  <path d="M 100 90 Q 90 98 85 95" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 90 Q 110 98 115 95" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="35" ry="40" fill="white"/>
  
  <!-- Arms -->
  <ellipse cx="65" cy="130" rx="12" ry="25" fill="#2C3E50"/>
  <ellipse cx="135" cy="130" rx="12" ry="25" fill="#2C3E50"/>
  
  <!-- Legs -->
  <ellipse cx="85" cy="175" rx="12" ry="15" fill="#2C3E50"/>
  <ellipse cx="115" cy="175" rx="12" ry="15" fill="#2C3E50"/>
  
  <!-- Laptop -->
  <rect x="75" y="125" width="50" height="35" rx="2" fill="#4ECDC4"/>
  <rect x="75" y="160" width="50" height="5" fill="#34495E"/>
  
  <!-- Code symbols on screen -->
  <text x="82" y="140" font-family="monospace" font-size="8" fill="white">&lt;/&gt;</text>
  <text x="102" y="140" font-family="monospace" font-size="8" fill="white">{}</text>
  <text x="82" y="150" font-family="monospace" font-size="8" fill="white">( )</text>
  <text x="102" y="150" font-family="monospace" font-size="8" fill="white">[ ]</text>
  
  <!-- Heart decoration -->
  <path d="M 160 40 Q 165 35 170 40 Q 175 35 180 40 Q 180 50 170 58 Q 165 53 160 50 Q 160 45 160 40 Z" fill="#FF6B9D" opacity="0.6"/>
</svg>
